services:
  - type: psql
    name: smartcommute-db
    databaseName: smartcommute
    user: smartcommute_admin
    plan: starter

  - type: redis
    name: smartcommute-redis
    plan: starter

  - type: web
    name: smartcommute-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && alembic upgrade head"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartcommute-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smartcommute-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: VERSION
        value: "1.0.0"
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: PROJECT_NAME
        value: "SmartCommute ITS"
      - key: API_V1_STR
        value: "/api/v1"
      - key: BACKEND_CORS_ORIGINS
        value: "https://smartcommute-client.onrender.com"
      - key: PAYSTACK_SECRET_KEY
        sync: false

  - type: web
    name: smartcommute-client
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://smartcommute-api.onrender.com/api/v1"
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
