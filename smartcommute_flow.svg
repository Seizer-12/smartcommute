<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220" role="img" aria-labelledby="title desc">
  <title id="title">SmartCommute end-to-end workflow</title>
  <desc id="desc">Flowchart showing commuter, driver, admin, frontend, API, data services, Paystack, email, and deployment workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef6ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
    <style>
      .h { font: 800 33px Arial, sans-serif; fill:#0f172a; }
      .s { font: 600 17px Arial, sans-serif; fill:#475569; }
      .t { font: 800 20px Arial, sans-serif; fill:#0f172a; }
      .b { font: 500 16px Arial, sans-serif; fill:#334155; }
      .small { font: 700 14px Arial, sans-serif; fill:#64748b; letter-spacing:.8px; }
      .box { stroke-width:2; filter:url(#shadow); }
      .line { fill:none; stroke:#64748b; stroke-width:3; marker-end:url(#arrow); }
      .dash { fill:none; stroke:#94a3b8; stroke-width:2.5; stroke-dasharray:8 8; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect width="1800" height="1220" fill="url(#bg)"/>
  <text x="900" y="62" text-anchor="middle" class="h">SmartCommute — End-to-End Project Workflow</text>
  <text x="900" y="92" text-anchor="middle" class="s">UNILORIN intelligent transport: queue visibility, fares, earnings, and administration</text>

  <!-- Actors -->
  <text x="83" y="148" class="small">PEOPLE</text>
  <g class="box"><rect x="55" y="170" width="250" height="112" rx="18" fill="#dbeafe" stroke="#2563eb"/><text x="180" y="215" text-anchor="middle" class="t">Commuter</text><text x="180" y="244" text-anchor="middle" class="b">finds a bus • joins queue</text><text x="180" y="267" text-anchor="middle" class="b">funds wallet • pays fare</text></g>
  <g class="box"><rect x="55" y="408" width="250" height="112" rx="18" fill="#dcfce7" stroke="#16a34a"/><text x="180" y="453" text-anchor="middle" class="t">Driver</text><text x="180" y="482" text-anchor="middle" class="b">shares location • dispatches</text><text x="180" y="505" text-anchor="middle" class="b">receives fares • withdraws</text></g>
  <g class="box"><rect x="55" y="646" width="250" height="112" rx="18" fill="#f3e8ff" stroke="#9333ea"/><text x="180" y="691" text-anchor="middle" class="t">Administrator</text><text x="180" y="720" text-anchor="middle" class="b">reviews users, balances,</text><text x="180" y="743" text-anchor="middle" class="b">vehicles, and payouts</text></g>

  <!-- Frontend -->
  <text x="440" y="148" class="small">REACT / VITE FRONTEND</text>
  <g class="box"><rect x="390" y="170" width="350" height="152" rx="18" fill="#eff6ff" stroke="#3b82f6"/><text x="565" y="207" text-anchor="middle" class="t">Public &amp; Authentication</text><text x="565" y="237" text-anchor="middle" class="b">Landing page • register • login</text><text x="565" y="261" text-anchor="middle" class="b">email verification • password reset</text><text x="565" y="285" text-anchor="middle" class="b">Zustand JWT session</text></g>
  <g class="box"><rect x="390" y="374" width="350" height="182" rx="18" fill="#eff6ff" stroke="#3b82f6"/><text x="565" y="411" text-anchor="middle" class="t">Role Dashboards</text><text x="565" y="441" text-anchor="middle" class="b">Commuter: queue, QR/manual fare</text><text x="565" y="465" text-anchor="middle" class="b">Driver: availability, dispatch, QR</text><text x="565" y="489" text-anchor="middle" class="b">Admin: users, vehicles, withdrawals</text><text x="565" y="525" text-anchor="middle" class="b">Geolocation heartbeat • browser alerts</text></g>
  <g class="box"><rect x="390" y="608" width="350" height="152" rx="18" fill="#eff6ff" stroke="#3b82f6"/><text x="565" y="645" text-anchor="middle" class="t">Wallet &amp; Account Screens</text><text x="565" y="675" text-anchor="middle" class="b">Paystack checkout • transaction history</text><text x="565" y="699" text-anchor="middle" class="b">withdrawal form • profile/password</text><text x="565" y="723" text-anchor="middle" class="b">Axios API client</text></g>

  <!-- API -->
  <text x="882" y="148" class="small">FASTAPI BACKEND — /api/v1</text>
  <g class="box"><rect x="830" y="170" width="390" height="144" rx="18" fill="#fff7ed" stroke="#ea580c"/><text x="1025" y="207" text-anchor="middle" class="t">Authentication &amp; Accounts</text><text x="1025" y="237" text-anchor="middle" class="b">register • login • JWT authorization</text><text x="1025" y="261" text-anchor="middle" class="b">email verification • password lifecycle</text><text x="1025" y="285" text-anchor="middle" class="b">account profile endpoint</text></g>
  <g class="box"><rect x="830" y="366" width="390" height="198" rx="18" fill="#fff7ed" stroke="#ea580c"/><text x="1025" y="403" text-anchor="middle" class="t">Queue &amp; Geofence Service</text><text x="1025" y="433" text-anchor="middle" class="b">heartbeat validates terminus location</text><text x="1025" y="457" text-anchor="middle" class="b">commuter join / leave / position</text><text x="1025" y="481" text-anchor="middle" class="b">driver availability and dispatch (14 seats)</text><text x="1025" y="505" text-anchor="middle" class="b">live wait, congestion, bus demand</text><text x="1025" y="535" text-anchor="middle" class="b">stale queue cleanup task</text></g>
  <g class="box"><rect x="830" y="616" width="390" height="202" rx="18" fill="#fff7ed" stroke="#ea580c"/><text x="1025" y="653" text-anchor="middle" class="t">Wallet &amp; Administration</text><text x="1025" y="683" text-anchor="middle" class="b">verify funding • credit wallet</text><text x="1025" y="707" text-anchor="middle" class="b">transfer fare to driver</text><text x="1025" y="731" text-anchor="middle" class="b">record driver withdrawal request</text><text x="1025" y="755" text-anchor="middle" class="b">admin balance, vehicle, payout review</text><text x="1025" y="785" text-anchor="middle" class="b">transaction pagination</text></g>

  <!-- Services -->
  <text x="1360" y="148" class="small">DATA &amp; EXTERNAL SERVICES</text>
  <g class="box"><rect x="1320" y="170" width="350" height="126" rx="18" fill="#f0fdf4" stroke="#16a34a"/><text x="1495" y="207" text-anchor="middle" class="t">PostgreSQL + Alembic</text><text x="1495" y="237" text-anchor="middle" class="b">users • queue entries • tokens</text><text x="1495" y="261" text-anchor="middle" class="b">transactions • withdrawal records</text></g>
  <g class="box"><rect x="1320" y="348" width="350" height="126" rx="18" fill="#fefce8" stroke="#ca8a04"/><text x="1495" y="385" text-anchor="middle" class="t">Redis</text><text x="1495" y="415" text-anchor="middle" class="b">60-second in-park presence</text><text x="1495" y="439" text-anchor="middle" class="b">available-driver keys</text></g>
  <g class="box"><rect x="1320" y="526" width="350" height="126" rx="18" fill="#eff6ff" stroke="#0284c7"/><text x="1495" y="563" text-anchor="middle" class="t">Paystack</text><text x="1495" y="593" text-anchor="middle" class="b">card checkout in frontend</text><text x="1495" y="617" text-anchor="middle" class="b">server-side payment verification</text></g>
  <g class="box"><rect x="1320" y="704" width="350" height="126" rx="18" fill="#fdf2f8" stroke="#db2777"/><text x="1495" y="741" text-anchor="middle" class="t">SMTP Email Provider</text><text x="1495" y="771" text-anchor="middle" class="b">verification and password-reset links</text></g>

  <!-- Deployment -->
  <text x="83" y="904" class="small">DEPLOYMENT &amp; OPERATIONS</text>
  <g class="box"><rect x="55" y="926" width="390" height="180" rx="18" fill="#e0f2fe" stroke="#0284c7"/><text x="250" y="965" text-anchor="middle" class="t">Static Frontend Hosting</text><text x="250" y="996" text-anchor="middle" class="b">Vite production build</text><text x="250" y="1020" text-anchor="middle" class="b">Nginx SPA routing / Render static site</text><text x="250" y="1044" text-anchor="middle" class="b">HTTPS required for geolocation &amp; camera</text><text x="250" y="1076" text-anchor="middle" class="b">VITE_API_URL + Paystack public key</text></g>
  <g class="box"><rect x="520" y="926" width="390" height="180" rx="18" fill="#fef3c7" stroke="#d97706"/><text x="715" y="965" text-anchor="middle" class="t">API Hosting</text><text x="715" y="996" text-anchor="middle" class="b">Uvicorn FastAPI process</text><text x="715" y="1020" text-anchor="middle" class="b">systemd + Nginx reverse proxy</text><text x="715" y="1044" text-anchor="middle" class="b">or Render / Railway web service</text><text x="715" y="1076" text-anchor="middle" class="b">health endpoint and CORS configuration</text></g>
  <g class="box"><rect x="985" y="926" width="685" height="180" rx="18" fill="#f8fafc" stroke="#64748b"/><text x="1327" y="965" text-anchor="middle" class="t">Required Production Controls</text><text x="1327" y="998" text-anchor="middle" class="b">Secrets: database, Redis, JWT key, Paystack secret, SMTP • Alembic migration before release</text><text x="1327" y="1030" text-anchor="middle" class="b">Operations: admin provisioning, backups, logging, monitoring, payment reconciliation</text><text x="1327" y="1062" text-anchor="middle" class="b">Quality: API/frontend tests, rate limits, transaction locking, webhook handling</text></g>

  <!-- arrows -->
  <path class="line" d="M305 226 H390"/><path class="line" d="M305 464 H390"/><path class="line" d="M305 702 H390"/>
  <path class="line" d="M740 246 H830"/><path class="line" d="M740 465 H830"/><path class="line" d="M740 684 H830"/>
  <path class="line" d="M1220 242 H1320"/><path class="line" d="M1220 432 H1320"/><path class="line" d="M1220 716 H1320"/>
  <path class="dash" d="M1025 314 V366"/><path class="dash" d="M1025 564 V616"/>
  <path class="dash" d="M1495 296 V348"/><path class="dash" d="M1495 474 V526"/><path class="dash" d="M1495 652 V704"/>
  <path class="line" d="M565 760 V856 H250 V926"/><path class="line" d="M1025 818 V856 H715 V926"/><path class="dash" d="M1495 830 V880 H1327 V926"/>
  <text x="762" y="837" class="small">API CALLS</text><text x="1270" y="867" class="small">CONFIG / INTEGRATIONS</text>
</svg>
